<h3>Switches ({{ switches | length }})</h3>

{% if switches %}
<figure>
<table>
    <thead>
        <tr>
            <th>Status</th>
            <th>Hostname</th>
            <th>Mgmt IP</th>
            <th>Platform</th>
            <th>Upstream</th>
            <th>Ports</th>
            <th>Last Seen</th>
            <th>Source</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for s in switches %}
        <tr>
            <td>
                {% if s.online %}
                    <span class="badge badge-online">online</span>
                {% else %}
                    <span class="badge badge-offline">offline</span>
                {% endif %}
            </td>
            <td>
                <a href="#" class="switch-toggle" data-switch-id="{{ s.id }}"
                   onclick="togglePorts(event, {{ s.id }}, {{ venue.id }})">
                    <strong>{{ s.hostname }}</strong>
                </a>
            </td>
            <td><code>{{ s.mgmt_ip or "-" }}</code></td>
            <td>{{ s.platform or "-" }}</td>
            <td>
                {% if s.upstream_hostname %}
                    {{ s.upstream_hostname }}
                    {% if s.upstream_interface %}<br><small>{{ s.upstream_interface }}</small>{% endif %}
                {% else %}-{% endif %}
            </td>
            <td>{{ s.ports | length }}</td>
            <td><small>{{ s.last_seen_at | localtime }}</small></td>
            <td>{{ s.source }}</td>
            <td style="white-space:nowrap;">
                <form hx-delete="/api/venues/{{ venue.id }}/switches/{{ s.id }}"
                      hx-target="#venue-switches" hx-swap="innerHTML"
                      hx-confirm="Delete switch {{ s.hostname }} and all its port data?"
                      style="margin:0;display:inline;">
                    <button type="submit" class="outline secondary" style="padding:0.2rem 0.5rem;width:auto;font-size:0.8rem;">Delete</button>
                </form>
            </td>
        </tr>
        <!-- Port drill-down row (hidden, loaded on demand) -->
        <tr id="ports-row-{{ s.id }}" style="display:none;">
            <td colspan="9" style="padding:0.5rem 1rem;background:var(--pico-card-background-color);">
                <div id="ports-content-{{ s.id }}">
                    <article aria-busy="true">Loading ports...</article>
                </div>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</figure>
{% else %}
<p style="color:var(--pico-muted-color);">No switches discovered yet. Run an inventory crawl to populate.</p>
{% endif %}

<script>
const _portsLoaded = {};
function togglePorts(evt, switchId, venueId) {
    evt.preventDefault();
    const row = document.getElementById('ports-row-' + switchId);
    if (row.style.display === 'none') {
        row.style.display = '';
        if (!_portsLoaded[switchId]) {
            _portsLoaded[switchId] = true;
            htmx.ajax('GET',
                '/partials/switches/' + venueId + '/' + switchId + '/ports',
                {target: '#ports-content-' + switchId, swap: 'innerHTML'});
        }
    } else {
        row.style.display = 'none';
    }
}
</script>
