{% extends "base.html" %}
{% set active_page = "inventory" %}
{% block title %}Switch Inventory - OUI Port Mapper{% endblock %}
{% block content %}
<h1>Switch Inventory</h1>

{% if venues %}
<div class="form-section">
    <h3>Load from Venue</h3>
    <div class="grid">
        <label>
            Venue
            <select id="venue-select">
                <option value="">-- Manual entry --</option>
                {% for v in venues %}
                <option value="{{ v.id }}">{{ v.name }} ({{ v.core_ip }})</option>
                {% endfor %}
            </select>
            <small class="field-help">Select a venue to use saved connection settings and credentials</small>
        </label>
    </div>
</div>
{% endif %}

<form id="inventory-form" novalidate>
    <div id="manual-fields">
        <div class="form-section">
            <h3>Connection</h3>
            <div class="grid">
                <label class="required">
                    Core Switch IP
                    <input type="text" name="core_ip" placeholder="10.1.1.1" required>
                </label>
                <label>
                    Platform
                    <select name="platform">
                        <option value="auto" selected>Auto-detect</option>
                        <option value="cisco_ios">Cisco IOS / IOS-XE</option>
                        <option value="cisco_nxos">Cisco NX-OS</option>
                        <option value="aruba_aoscx">Aruba AOS-CX</option>
                    </select>
                    <small class="field-help">Leave on Auto unless you know the fabric type</small>
                </label>
            </div>
            <div class="grid">
                <label class="required">
                    SSH Username
                    <input type="text" name="username" required autocomplete="username">
                </label>
                <label class="required">
                    SSH Password
                    <input type="password" name="password" required autocomplete="current-password">
                </label>
            </div>
            <label>
                Enable Secret
                <input type="password" name="enable_secret" autocomplete="off">
                <small class="field-help">Only needed if switches require enable mode. Defaults to SSH password.</small>
            </label>
        </div>

        <details class="form-section">
            <summary><h3 style="display:inline;cursor:pointer;">Options</h3></summary>
            <label class="required" style="margin-top:0.75rem;">
                Management Subnet
                <input type="text" name="mgmt_subnet" placeholder="10.10.0.0/24" required>
                <small class="field-help">Restrict neighbor recursion to this subnet. Without this, the crawler will attempt SSH into every LLDP neighbor and hang.</small>
            </label>
            <details style="margin-top:0.75rem;">
                <summary style="font-size:0.85rem;cursor:pointer;color:var(--pico-muted-color);">Advanced</summary>
                <label style="margin-top:0.5rem;">
                    Workers
                    <input type="number" name="workers" value="10" min="1" max="50">
                    <small class="field-help">Parallel SSH sessions</small>
                </label>
            </details>
        </details>
    </div>

    <div id="venue-summary" style="display:none;">
        <div class="form-section">
            <h3>Venue Configuration</h3>
            <p id="venue-summary-text" style="margin-bottom:0;"></p>
        </div>
    </div>

    <button type="submit" id="btn-submit" class="btn-primary" disabled>Start Inventory</button>
</form>

<div id="result"></div>

<script>
const form = document.getElementById('inventory-form');
const btn = document.getElementById('btn-submit');
const required = form.querySelectorAll('[required]');
const manualFields = document.getElementById('manual-fields');
const venueSelect = document.getElementById('venue-select');
const venueSummary = document.getElementById('venue-summary');
const venueSummaryText = document.getElementById('venue-summary-text');
let selectedVenueId = null;

function checkReady() {
    const ready = Array.from(required).every(f => {
        if (f.closest('#manual-fields') && manualFields.style.display === 'none') return true;
        return f.value.trim() !== '';
    });
    btn.disabled = !ready;
}
required.forEach(f => f.addEventListener('input', checkReady));
checkReady();

if (venueSelect) {
    venueSelect.addEventListener('change', function() {
        selectedVenueId = this.value || null;
        if (selectedVenueId) {
            fetch('/api/venues/' + selectedVenueId + '/prefill')
                .then(r => { if (!r.ok) throw new Error('Prefill failed: ' + r.status); return r.json(); })
                .then(v => {
                    manualFields.style.display = 'none';
                    venueSummary.style.display = '';
                    let summary = '<strong>' + venueSelect.selectedOptions[0].text + '</strong><br>';
                    summary += 'Platform: ' + v.platform + ' &middot; Subnet: ' + (v.mgmt_subnet || '(none)') + ' &middot; Workers: ' + v.workers;
                    venueSummaryText.innerHTML = summary;
                    btn.disabled = false;
                })
                .catch(err => {
                    document.getElementById('result').innerHTML =
                        '<article><p style="color:var(--pico-del-color);">' + err.message + '</p></article>';
                });
        } else {
            manualFields.style.display = '';
            venueSummary.style.display = 'none';
            checkReady();
        }
    });
}

form.addEventListener('submit', function(evt) {
    evt.preventDefault();
    btn.classList.add('loading');
    btn.disabled = true;

    if (selectedVenueId) {
        fetch('/api/venues/' + selectedVenueId + '/inventory', {method: 'POST'})
            .then(r => {
                if (!r.ok) return r.text().then(t => {
                    try { throw new Error(JSON.parse(t).detail || 'Server error ' + r.status); }
                    catch(e) { if (e.message.startsWith('Server error')) throw e; throw new Error('Server error ' + r.status + ': ' + t.substring(0, 200)); }
                });
                return r.json();
            })
            .then(data => { window.location.href = '/jobs/' + data.id; })
            .catch(err => {
                btn.classList.remove('loading');
                btn.disabled = false;
                document.getElementById('result').innerHTML =
                    '<article><p style="color:var(--pico-del-color);">' + err.message + '</p></article>';
            });
        return;
    }

    const fd = new FormData(this);
    const data = {
        core_ip: fd.get('core_ip').trim(),
        platform: fd.get('platform'),
        username: fd.get('username').trim(),
        password: fd.get('password'),
        enable_secret: fd.get('enable_secret') || null,
        workers: parseInt(fd.get('workers')) || 10,
        mgmt_subnet: fd.get('mgmt_subnet').trim() || null,
    };

    fetch('/api/inventory/start', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data),
    })
    .then(r => { if (!r.ok) throw new Error('Server returned ' + r.status); return r.json(); })
    .then(job => { window.location.href = '/jobs/' + job.id; })
    .catch(err => {
        btn.classList.remove('loading');
        checkReady();
        document.getElementById('result').innerHTML =
            '<article><p style="color:var(--pico-del-color);">' + err.message + '</p></article>';
    });
});
</script>
{% endblock %}
